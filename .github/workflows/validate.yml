name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify skill package discovery
        run: npx -y skills add . --list

      - name: Verify Python scripts compile
        run: python -m py_compile scripts/bootstrap_noootwo_harness.py scripts/validate_noootwo_readiness.py scripts/check_visual_gates.py

      - name: Verify harness bootstrap
        run: |
          tmpdir="$(mktemp -d)"
          python scripts/bootstrap_noootwo_harness.py "$tmpdir" --profile full
          test -f "$tmpdir/AGENTS.md"
          test -f "$tmpdir/.noootwo/system.md"
          test -f "$tmpdir/.noootwo/design-tokens.md"
          test -f "$tmpdir/.noootwo/adoption.md"
          test -f "$tmpdir/.noootwo/product-facts.md"
          test -f "$tmpdir/.noootwo/brief.md"
          test -f "$tmpdir/.noootwo/style-discovery.md"
          test -f "$tmpdir/.noootwo/reference-board.md"
          test -f "$tmpdir/.noootwo/directions.md"
          test -f "$tmpdir/.noootwo/review.md"
          test -f "$tmpdir/.noootwo/handoff/implementation.md"
          test -f "$tmpdir/.noootwo/handoff/acceptance.md"
          test -f "$tmpdir/.noootwo/handoff/assets.md"
          if python scripts/validate_noootwo_readiness.py "$tmpdir" --allow-non-ready; then
            echo "Expected pending bootstrap harness to fail readiness validation"
            exit 1
          fi
