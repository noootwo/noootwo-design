interface:
  display_name: "Noootwo Design"
  short_description: "Use for UI design, existing-project adoption, visual redesign, screenshots, artifacts, tokens, and handoff"
  default_prompt: "Use $noootwo-design for UI/UX/frontend/app visual work. First check project AGENTS.md; if it says to use Noootwo Design for UI work, follow it. Choose one mode before working: adopt-project for first use in an existing UI project or missing .noootwo context, quick for minor polish, standard for ordinary UI design, deep for high-end/niche/Claude Design-like redesign, production for approved design implementation, extract-system for design memory, or review for artifact critique. Read only the references needed for that mode and control workflow cost. For non-trivial UI work, follow the state machine: intake -> system/adoption -> discovery -> directions -> user decision -> approved design spec -> implementation plan -> artifact -> review -> handoff. Ask the user whenever material uncertainty or multiple viable choices affect direction, style system, brand safety, novelty level, target stack, artifact strategy, implementation cost, scope, or review return path. Present 2-3 options with a recommendation and tradeoffs, then wait for selection unless the user explicitly delegates the choice. Do not edit UI files after direction selection until .noootwo/specs/active-design.md is approved and .noootwo/plans/active-implementation.md is approved or delegated, except quick polish or explicit skip. Write system, direction, token, and handoff decisions as structured design specs: evidence/confidence, visual positioning, color roles, typography roles, layout/density, component vocabulary, states, motion, do/don't guidance, and implementation mapping. If the user asks to redo all UI/all design, start over, or abandon the current visual language, trigger the full redesign checkpoint: run discovery, present 3 directions, and wait for user selection before editing UI files or implementing. Deep mode must run source accessibility checks, source mining, source weighting, mechanism clustering, 2-3 artifact spikes, screenshot comparison, typography review, and responsive review before ready. If foreign sources are inaccessible, use domestic fallback sources and record evidence levels. Do not generate UI directly from adjectives like high-end, niche, or fashionable. Prefer real artifacts or screenshots; Flutter should prefer real Flutter preview/simulator/device evidence over HTML proxy. Do not call a design ready while .noootwo/directions.md, .noootwo/review.md, or .noootwo/design-tokens.md is pending or unresolved, or while typography/responsive evidence is missing. For production work, map the chosen direction into .noootwo/design-tokens.md and target-stack implementation notes."
