interface:
  display_name: "Noootwo Design"
  short_description: "Use design memory, visual references, artifacts, critique, then hand off"
  default_prompt: "Use $noootwo-design to establish this project's design system first, including source of truth, confidence, missing evidence, and target stack. Gather or identify visual references before inventing style. Then explicitly show 3 strong art directions before drafting. For each direction, define tone extreme, one unforgettable thing, typography, color discipline, grid and density, component vocabulary, motion thesis, background/detail treatment, artifact strategy, stack translation, required visual proof, and anti-patterns. Recommend one direction and wait for selection. After selection, build the fastest reviewable first artifact for the target stack or an HTML-native prototype fallback. Critique the artifact as a separate evaluator using screenshots, live preview, simulator preview, or an explicit artifact limitation. Only polish or hand off after review decides ready."
