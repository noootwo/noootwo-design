interface:
  display_name: "Noootwo Design"
  short_description: "Use for UI design, visual redesign, screenshots, artifacts, tokens, and handoff"
  default_prompt: "Use $noootwo-design for UI/UX/frontend/app visual work. First check project AGENTS.md; if it says to use Noootwo Design for UI work, follow it. Choose one mode before working: quick for minor polish, standard for ordinary UI design, deep for high-end/niche/Claude Design-like redesign, production for approved design implementation, extract-system for design memory, or review for artifact critique. Read only the references needed for that mode. Prefer real artifacts or screenshots. Do not call a design ready without artifact evidence or an explicit limitation. For production work, map the chosen direction into .noootwo/design-tokens.md and target-stack implementation notes."
