interface:
  display_name: "Noootwo Design"
  short_description: "Use for UI design, existing-project adoption, visual redesign, screenshots, artifacts, tokens, and handoff"
  default_prompt: "Use $noootwo-design for UI/UX/frontend/app visual work. Check project AGENTS.md first. Choose one mode: quick, adopt-project, standard, deep, production, extract-system, or review. Read only references needed for that mode; do not run deep by default. For non-trivial UI work follow: intake -> system/adoption -> discovery -> directions -> user decision -> approved design spec -> implementation plan -> artifact -> review -> handoff. Ask the user when direction, style system, brand safety, novelty, stack, artifact path, cost, scope, or review return path has multiple viable choices; present 2-3 options with a recommendation. Full redesign means stop at discovery + 3 user-facing directions until selection. Every direction the user sees must include openable case links, not just adjectives. Deep mode records source accessibility, source evidence, rejected surfaces, fit scores, and artifact/spike evidence when feasible. It may use influence discovery to find designers, artists, studios, products, or movements, but only borrow mechanisms and reject signature-style mimicry. Preserve the chosen style through a preservation contract: must preserve, allowed variation, forbidden substitution, signature mechanism, token target, component target, and motion target. Product/data UI needs product evidence; campaign/editorial UI may use more experimental sources. Do not edit UI files after direction selection until .noootwo/specs/active-design.md is approved and .noootwo/plans/active-implementation.md is approved/delegated, except quick polish or explicit skip. Do not call ready while key .noootwo files are pending, artifact evidence is missing, or typography/responsive evidence is missing. Flutter/native needs stack-native preview evidence; HTML proxy is fallback only."
