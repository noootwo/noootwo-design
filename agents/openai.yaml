interface:
  display_name: "Noootwo Design"
  short_description: "Use for UI design, existing-project adoption, visual redesign, screenshots, artifacts, tokens, and handoff"
  default_prompt: "Use $noootwo-design for UI/UX/frontend/app visual work. First check project AGENTS.md; if it says to use Noootwo Design for UI work, follow it. Choose one mode before working: adopt-project for first use in an existing UI project or missing .noootwo context, quick for minor polish, standard for ordinary UI design, deep for high-end/niche/Claude Design-like redesign, production for approved design implementation, extract-system for design memory, or review for artifact critique. Read only the references needed for that mode and control workflow cost. Deep mode must run source accessibility checks, source mining, source weighting, mechanism clustering, 2-3 artifact spikes, screenshot comparison, typography review, and responsive review before ready. If foreign sources are inaccessible, use domestic fallback sources and record evidence levels. Do not generate UI directly from adjectives like high-end, niche, or fashionable. Prefer real artifacts or screenshots; Flutter should prefer real Flutter preview/simulator/device evidence over HTML proxy. Do not call a design ready while .noootwo/directions.md, .noootwo/review.md, or .noootwo/design-tokens.md is pending or unresolved, or while typography/responsive evidence is missing. For production work, map the chosen direction into .noootwo/design-tokens.md and target-stack implementation notes."
